version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "Phase install"
      - java -version
      - mvn -version
  pre_build:
    commands:
      - echo "Phase pre-build"
      - pwd
      - ls -la
      - test -f pom.xml && echo "pom.xml present" || exit 1
  build:
    commands:
      - echo "Phase build"
      - date
      - mvn clean package -DskipTests
      - date
  post_build:
    commands:
      - echo "Phase post-build"
      - ls -la target/
      - JAR=$(ls target/*.jar | grep -v original | head -1)
      - echo "Jar found $JAR"
      - cp "$JAR" target/app.jar
      - ls -la target/app.jar

artifacts:
  files:
    - target/app.jar
    - appspec.yml
    - scripts/**/*
  discard-paths: no