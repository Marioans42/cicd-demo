version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "===== INSTALL ====="
      - java -version
      - mvn -version
  pre_build:
    commands:
      - echo "===== PRE-BUILD ====="
      - echo "Working dir: $(pwd)"
      - ls -la
      - test -f pom.xml && echo "pom.xml OK" || (echo "pom.xml missing" && exit 1)
  build:
    commands:
      - echo "===== BUILD ====="
      - echo "Build started on $(date)"
      - mvn clean package -DskipTests
      - echo "Build finished on $(date)"
  post_build:
    commands:
      - echo "===== POST-BUILD ====="
      - ls -la target/
      # Wildcard : prend n'importe quel .jar (sauf les *-original.jar de Spring Boot)
      - JAR=$(ls target/*.jar | grep -v original | head -1)
      - echo "JAR trouvé : $JAR"
      - cp "$JAR" target/app.jar
      - ls -la target/app.jar

artifacts:
  files:
    - target/app.jar
    - appspec.yml
    - scripts/**/*
  discard-paths: no