version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo "Phase install"
      - java -version
      - mvn -version
  pre_build:
    commands:
      - echo "Phase pre-build"
      - pwd
      - ls -la
      - cd simple-spring-app && ls -la
      - test -f simple-spring-app/pom.xml && echo "pom.xml found" || exit 1
  build:
    commands:
      - echo "Phase build"
      - cd simple-spring-app
      - mvn clean package -DskipTests
  post_build:
    commands:
      - echo "Phase post-build"
      - cd simple-spring-app
      - ls -la target/
      - JAR=$(ls target/*.jar | grep -v original | head -1)
      - echo "Jar found $JAR"
      - cp "$JAR" ../app.jar
      - cd ..
      - ls -la app.jar

artifacts:
  files:
    - app.jar
    - appspec.yml
    - scripts/**/*
  discard-paths: no