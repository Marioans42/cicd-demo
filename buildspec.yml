version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo "Phase install"
      - java -version
      - mvn -version
  pre_build:
    commands:
      - echo "Phase pre-build"
      - echo "Working dir is $(pwd)"
      - ls -la
      - echo "Searching pom.xml"
      - find . -name "pom.xml" -not -path "*/node_modules/*" -not -path "*/target/*"
      - POM_PATH=$(find . -name "pom.xml" -not -path "*/node_modules/*" -not -path "*/target/*" | head -1)
      - echo "Found at $POM_PATH"
      - test -n "$POM_PATH" || (echo "No pom.xml" && exit 1)
  build:
    commands:
      - echo "Phase build"
      - POM_PATH=$(find . -name "pom.xml" -not -path "*/node_modules/*" -not -path "*/target/*" | head -1)
      - POM_DIR=$(dirname "$POM_PATH")
      - cd "$POM_DIR"
      - pwd
      - mvn clean package -DskipTests
  post_build:
    commands:
      - echo "Phase post-build"
      - POM_PATH=$(find . -name "pom.xml" -not -path "*/node_modules/*" -not -path "*/target/*" | head -1)
      - POM_DIR=$(dirname "$POM_PATH")
      - ls -la "$POM_DIR/target/"
      - JAR=$(ls "$POM_DIR"/target/*.jar | grep -v original | head -1)
      - echo "Jar found $JAR"
      - cp "$JAR" app.jar
      - ls -la app.jar

artifacts:
  files:
    - app.jar
    - appspec.yml
    - scripts/**/*
  discard-paths: no