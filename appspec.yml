version: 0.0
os: linux

files:
  - source: app.jar
    destination: /opt/app
    overwrite: true
  - source: scripts/start.sh
    destination: /opt/app
    overwrite: true
  - source: scripts/stop.sh
    destination: /opt/app
    overwrite: true

permissions:
  - object: /opt/app
    pattern: "**"
    owner: ec2-user
    group: ec2-user
    mode: 755

hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 60
      runas: ec2-user
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 60
      runas: root
  ApplicationStart:
    - location: scripts/start.sh
      timeout: 120
      runas: ec2-user
  ValidateService:
    - location: scripts/validate.sh
      timeout: 60
      runas: ec2-user